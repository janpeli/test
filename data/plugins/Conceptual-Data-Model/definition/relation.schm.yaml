$schema: "https://json-schema.org/draft/2020-12/schema"
title: CDM Relation
type: object
properties:
  general:
    type: object
    title: Default object properties
    description: Default object properties
    required:
      - name
      - template
    properties:
      name:
        title: Name
        description: CDM Relation Name
        type: string
      comment:
        title: Description
        description: CDM Relation description
        type: string
        format: text
      template:
        title: Template
        description: CDM Relation Template
        type: string
      tags:
        title: Tags
        type: array
        items:
          type: string
  relation:
    title: Relation
    description: Relation endpoints and cardinality
    type: object
    properties:
      source_entity:
        title: Source entity
        description: The entity on the source side of the relation
        type: object
        format: reference
        properties:
          $reference:
            type: string
            format: uri-reference
            sufix:
              - ent
      source_cardinality:
        title: Source cardinality
        description: Cardinality on the source side
        type: string
        enum:
          - "1"
          - N
      target_entity:
        title: Target entity
        description: The entity on the target side of the relation
        type: object
        format: reference
        properties:
          $reference:
            type: string
            format: uri-reference
            sufix:
              - ent
      target_cardinality:
        title: Target cardinality
        description: Cardinality on the target side
        type: string
        enum:
          - "1"
          - N
      cardinality:
        title: Cardinality
        description: Overall cardinality of the relation
        type: string
        enum:
          - "1:1"
          - "1:N"
          - "M:N"
  attributes:
    title: Attributes
    description: Attributes carried by this relation
    type: array
    items:
      type: object
      description: Attribute definition
      required:
        - name
      Unique_properties:
        - name
      properties:
        name:
          description: Attribute name
          type: string
        comment:
          description: Provides definition of the attribute
          type: string
