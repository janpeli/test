$schema: "https://json-schema.org/draft/2020-12/schema"
title: LDM Entity
type: object
properties:
  general:
    type: object
    title: Default object properties
    description: Default object properties
    required:
      - name
      - template
    properties:
      name:
        title: Name
        description: LDM Entity name
        type: string
      comment:
        title: Description
        description: Business definition of the entity
        type: string
        format: text
      template:
        title: Template
        description: LDM Entity template
        type: string
      tags:
        title: Tags
        type: array
        items:
          type: string
  attributes:
    title: Attributes
    description: LDM entity attributes
    type: array
    items:
      type: object
      description: Attribute definition
      required:
        - name
      Unique_properties:
        - name
      properties:
        name:
          title: Attribute name
          description: Attribute name
          type: string
        comment:
          title: Description
          description: Business definition of the attribute
          type: string
        domain:
          title: Domain
          description: Reference to a shared Domain definition (overrides inline type when set)
          type: object
          format: reference
          properties:
            $reference:
              type: string
              format: uri-reference
              sufix:
                - dom
        base_type:
          title: Base type
          description: Inline logical type (used when no domain is referenced)
          type: string
          enum:
            - String
            - Integer
            - Decimal
            - Boolean
            - Date
            - Time
            - DateTime
            - Binary
        length:
          title: Length
          description: Maximum length (characters or bytes)
          type: integer
          valid_for:
            property: base_type
            enum:
              - String
              - Binary
        precision:
          title: Precision
          description: Total number of significant digits
          type: integer
          valid_for:
            property: base_type
            enum:
              - Decimal
        scale:
          title: Scale
          description: Number of digits after the decimal point
          type: integer
          valid_for:
            property: base_type
            enum:
              - Decimal
        nullable:
          title: Nullable
          description: Whether this attribute may be null
          type: boolean
        default_value:
          title: Default value
          description: Default value when none is supplied
          type: string
  keys:
    title: Keys
    description: Primary and alternate keys defined over this entity's attributes
    type: array
    items:
      type: object
      description: Key definition
      required:
        - key_name
        - key_type
      properties:
        key_name:
          title: Key name
          description: Name of the key
          type: string
        key_type:
          title: Key type
          description: Type of key
          type: string
          enum:
            - Primary Key
            - Alternate Key
        key_attributes:
          title: Key attributes
          description: Attributes that form this key
          type: array
          items:
            type: object
            format: sub-reference
            properties:
              $sub_reference:
                type: string
                JSONPath: "$.attributes[*].name"
