$schema: "https://json-schema.org/draft/2020-12/schema"
title: Logical Data Model
description: A logical data model describes the structure of data in a database-agnostic way, including entities, attributes with logical types, relationships, and reusable domains.
type: object
properties:
  general:
    type: object
    title: Default object properties
    description: Default object properties
    required:
      - Name
    properties:
      plugin_uuid:
        title: Plugin UUID
        description: UUID of the model plugin based on which this model was created.
        type: string
      Name:
        title: Name
        description: Name of the model.
        type: string
      Description:
        title: Description
        description: Description of the model.
        type: string
        format: text
      Owner:
        title: Owner
        description: Person or group responsible for the model. (e.g. DWH@company.com)
        type: string
      Creator:
        title: Created by
        description: Creator of the model. (e.g. greg@company.com)
        type: string
      Subject_area:
        title: Subject area
        description: Business subject area this model covers.
        type: string
      Version:
        title: Version
        description: Model version identifier.
        type: string
