$schema: "https://json-schema.org/draft/2020-12/schema"
title: Oracle Physical Data Model
description: A physical data model targeting Oracle Database, covering schemas, tables, views, and indexes.
type: object
properties:
  general:
    type: object
    title: Default object properties
    description: Default object properties
    required:
      - Name
    properties:
      plugin_uuid:
        title: Plugin UUID
        description: UUID of the model plugin based on which this model was created.
        type: string
      Name:
        title: Name
        description: Name of the model.
        type: string
      Description:
        title: Description
        description: Description of the model.
        type: string
        format: text
      Owner:
        title: Owner
        description: Person or group responsible for the model. (e.g. DWH@company.com)
        type: string
      Creator:
        title: Created by
        description: Creator of the model. (e.g. greg@company.com)
        type: string
      Oracle_version:
        title: Oracle version
        description: Target Oracle Database version.
        type: string
        enum:
          - "19c"
          - "21c"
          - "23ai"
      Environment:
        title: Environment
        description: Deployment environment this model targets.
        type: string
        enum:
          - Development
          - Test
          - UAT
          - Production
